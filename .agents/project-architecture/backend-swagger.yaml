          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                leagueId:
                  type: number
  /preferences:
    get:
      operationId: getPreferences
      tags:
        - Admin & Health
      summary: Obtenir les préférences utilisateur
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
    put:
      operationId: putPreferences
      tags:
        - Admin & Health
      summary: Mettre à jour les préférences
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                favorite_leagues:
                  type: array
                  items:
                    type: number
                favorite_teams:
                  type: array
                  items:
                    type: number
                tracked_leagues:
                  type: array
                  items:
                    type: number
  /import/league:
    post:
      operationId: postImportLeague
      tags:
        - Import & Sync
      summary: Importer une ligue
      responses:
        200:
          description: Succès
          content:
            application/json:
