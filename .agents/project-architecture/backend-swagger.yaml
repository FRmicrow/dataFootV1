            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - leagueName
              properties:
                leagueName:
                  type: string
  /admin/health/check-deep:
    post:
