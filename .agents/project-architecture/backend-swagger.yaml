                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issues:
                  type: array
                  items:
                    type: object
                    properties:
