openapi: 3.0.0
info:
  title: StatFootV3 - API Reference
  description: Documentation exhaustive des API Backend (V3) incluant les payloads et réponses exactes.
  version: "3.0"
servers:
  - url: "http://localhost:3001/api"
    description: Serveur local
tags:
  - name: Admin & Health
    description: Administration and health-check endpoints for the application and database.
  - name: Betting & ML
    description: Machine learning predictions and betting recommendations.
  - name: Dashboard
    description: General dashboard statistics and metrics.
  - name: Fixtures
    description: Management of matches, events, lineups, and tactical stats.
  - name: Import & Sync
    description: Endpoints for importing and synchronizing data from external providers.
  - name: Leagues
    description: League management and retrieval.
  - name: Players & Clubs
    description: Endpoints relating to player profiles, club profiles, and career statistics.
  - name: Studio
    description: Content studio management pathways.
  - name: Resolution & Intelligence
    description: Intelligent operations like duplication resolution and backtesting.
paths:
  /stats:
    get:
      operationId: getStats
      tags:
        - Dashboard
      summary: Obtenir les statistiques globales V3
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  volumetrics:
                    type: object
                  distribution:
                    type: object
                  players_by_country:
                    type: array
                    items:
                      type: object
                  fixture_trends:
                    type: object
                  health_summary:
                    type: object
                    properties:
                      score:
                        type: number
                      coverage_percent:
                        type: number
                      orphans:
                        type: number
                      partial_seasons:
                        type: number
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /leagues/imported:
    get:
      operationId: getLeaguesImported
      tags:
        - Dashboard
      summary: Lister les ligues importées
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /leagues/discovered:
    get:
      operationId: getLeaguesDiscovered
      tags:
        - Dashboard
      summary: Lister les ligues découvertes groupées par pays
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /admin/health:
    get:
      operationId: getAdminHealth
      tags:
        - Admin & Health
      summary: Vérifier la santé de la base de données
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /admin/health/fix:
    post:
      operationId: postAdminHealthFix
      tags:
        - Admin & Health
      summary: Corriger un problème de santé spécifique
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - issueId
                - type
              properties:
                issueId:
                  type: string
                type:
                  type: string
  /admin/health/fix-all:
    post:
      operationId: postAdminHealthFixAll
      tags:
        - Admin & Health
      summary: Lancer toutes les routines de correction
      responses:
        200:
          description: Succès
          content:
            application/json:
