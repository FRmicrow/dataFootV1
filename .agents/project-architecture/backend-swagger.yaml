        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /admin/health/check-league:
    post:
      tags:
        - Admin & Health
      summary: Check de santé d'une ligue
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - leagueName
              properties:
                leagueName:
                  type: string
  /admin/health/check-deep:
    post:
      tags:
        - Admin & Health
      summary: Check profond
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
