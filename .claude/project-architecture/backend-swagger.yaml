openapi: 3.0.0
info:
  title: StatFootV3 & V4 - API Reference
  description: Documentation exhaustive des API Backend V3 (legacy) et V4 (nouvelle architecture). V4 utilise un schéma PostgreSQL dédié (v4.*) et une architecture découplée sans couche Repository.
  version: "4.0"
servers:
  - url: "http://localhost:3001/api"
    description: Serveur local
tags:
  # ===== V3 TAGS (LEGACY) =====
  - name: Admin & Health
    description: Administration and health-check endpoints for the application and database.
  - name: Betting & ML
    description: Machine learning predictions and betting recommendations.
  - name: Dashboard
    description: General dashboard statistics and metrics.
  - name: Fixtures
    description: Management of matches, events, lineups, and tactical stats.
  - name: Import & Sync
    description: Endpoints for importing and synchronizing data from external providers.
  - name: Leagues
    description: League management and retrieval.
  - name: Players & Clubs
    description: Endpoints relating to player profiles, club profiles, and career statistics.
  - name: Studio
    description: Content studio management pathways.
  - name: Resolution & Intelligence
    description: Intelligent operations like duplication resolution and backtesting.

  # ===== V4 TAGS (NEW ARCHITECTURE) =====
  - name: V4 Leagues
    description: League endpoints using V4 architecture (PostgreSQL v4.* schema).
  - name: V4 Clubs
    description: Club profile and match data endpoints (V4).
  - name: V4 ML
    description: Machine learning predictions and analytics (V4).
  - name: V4 Odds
    description: Betting odds endpoints (V4).
  - name: V4 xG
    description: Expected goals analytics (V4).
  - name: V4 Admin
    description: Administrative operations (secured by X-Admin-Key header).
  - name: V4 Studio
    description: Infographic Studio endpoints — template catalog, resolver, PNG export, tweet drafts (V48+).
paths:
  /stats:
    get:
      operationId: getStats
      tags:
        - Dashboard
      summary: Obtenir les statistiques globales V3
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  volumetrics:
                    type: object
                  distribution:
                    type: object
                  players_by_country:
                    type: array
                    items:
                      type: object
                  fixture_trends:
                    type: object
                  health_summary:
                    type: object
                    properties:
                      score:
                        type: number
                      coverage_percent:
                        type: number
                      orphans:
                        type: number
                      partial_seasons:
                        type: number
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /leagues/imported:
    get:
      operationId: getLeaguesImported
      tags:
        - Dashboard
      summary: Lister les ligues importées
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /leagues/discovered:
    get:
      operationId: getLeaguesDiscovered
      tags:
        - Dashboard
      summary: Lister les ligues découvertes groupées par pays
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /admin/health:
    get:
      operationId: getAdminHealth
      tags:
        - Admin & Health
      summary: Vérifier la santé de la base de données
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /admin/health/fix:
    post:
      operationId: postAdminHealthFix
      tags:
        - Admin & Health
      summary: Corriger un problème de santé spécifique
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - issueId
                - type
              properties:
                issueId:
                  type: string
                type:
                  type: string
  /admin/health/fix-all:
    post:
      operationId: postAdminHealthFixAll
      tags:
        - Admin & Health
      summary: Lancer toutes les routines de correction
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issues:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
  /admin/health/history:
    get:
      operationId: getAdminHealthHistory
      tags:
        - Admin & Health
      summary: Historique du nettoyage
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /admin/health/revert/{groupId}:
    post:
      operationId: postAdminHealthRevertByGroupid
      tags:
        - Admin & Health
      summary: Annuler une correction
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
  /admin/health/leagues:
    get:
      operationId: getAdminHealthLeagues
      tags:
        - Admin & Health
      summary: Noms des ligues pour health check
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /admin/health/check-league:
    post:
      operationId: postAdminHealthCheckLeague
      tags:
        - Admin & Health
      summary: Check de santé d'une ligue
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - leagueName
              properties:
                leagueName:
                  type: string
  /admin/health/check-deep:
    post:
      operationId: postAdminHealthCheckDeep
      tags:
        - Admin & Health
      summary: Check profond
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                leagueId:
                  type: number
  /preferences:
    get:
      operationId: getPreferences
      tags:
        - Admin & Health
      summary: Obtenir les préférences utilisateur
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
    put:
      operationId: putPreferences
      tags:
        - Admin & Health
      summary: Mettre à jour les préférences
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                favorite_leagues:
                  type: array
                  items:
                    type: number
                favorite_teams:
                  type: array
                  items:
                    type: number
                tracked_leagues:
                  type: array
                  items:
                    type: number
  /import/league:
    post:
      operationId: postImportLeague
      tags:
        - Import & Sync
      summary: Importer une ligue
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - leagueId
                - season
              properties:
                leagueId:
                  type: number
                season:
                  type: number
                forceApiId:
                  type: boolean
  /import/batch:
    post:
      operationId: postImportBatch
      tags:
        - Import & Sync
      summary: Import par lots
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - selection
              properties:
                selection:
                  type: array
                  items:
                    type: object
                    properties:
                      leagueId:
                        type: number
                      seasons:
                        type: array
                        items:
                          type: number
                      forceApiId:
                        type: boolean
                      forceRefresh:
                        type: boolean
  /import/matrix-status:
    get:
      operationId: getImportMatrixStatus
      tags:
        - Import & Sync
      summary: Statut global de la matrice d'import
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /import/state:
    get:
      operationId: getImportState
      tags:
        - Import & Sync
      summary: État du processus d'import
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /import/audit-scan:
    post:
      operationId: postImportAuditScan
      tags:
        - Import & Sync
      summary: Scanner les anomalies d'import
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /import/league/{id}/deep-sync:
    post:
      operationId: postImportLeagueByIdDeepSync
      tags:
        - Import & Sync
      summary: Deep sync d'une ligue
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /fixtures/events/candidates:
    get:
      operationId: getFixturesEventsCandidates
      tags:
        - Fixtures
      summary: Matchs candidats pour import d'événements
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /fixtures/events/sync:
    post:
      operationId: postFixturesEventsSync
      tags:
        - Fixtures
      summary: Sync des événements d'un match
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fixture_ids:
                  type: array
                  items:
                    type: number
                league_id:
                  type: number
                season_year:
                  type: number
                limit:
                  type: number
  /fixtures/{id}/events:
    get:
      operationId: getFixturesByIdEvents
      tags:
        - Fixtures
      summary: Obtenir les événements d'un match
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /fixtures/{id}/tactical-stats:
    get:
      operationId: getFixturesByIdTacticalStats
      tags:
        - Fixtures
      summary: Statistiques tactiques d'un match
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /fixtures/{id}/player-stats:
    get:
      operationId: getFixturesByIdPlayerStats
      tags:
        - Fixtures
      summary: Statistiques des joueurs d'un match
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /fixtures/{id}:
    get:
      operationId: getFixturesById
      tags:
        - Fixtures
      summary: Détails d'un match
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      fixture_id:
                        type: integer
                      league_id:
                        type: integer
                      date:
                        type: string
                        format: date-time
                      home_team_name:
                        type: string
                      away_team_name:
                        type: string
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /fixtures/{id}/lineups:
    get:
      operationId: getFixturesByIdLineups
      tags:
        - Fixtures
      summary: Compositions d'un match
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      source:
                        type: string
                      message:
                        type: string
                        nullable: true
                      lineups:
                        type: array
                        items:
                          type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /fixtures/lineups/candidates:
    get:
      operationId: getFixturesLineupsCandidates
      tags:
        - Fixtures
      summary: Matchs candidats pour import de compos
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /fixtures/lineups/import:
    post:
      operationId: postFixturesLineupsImport
      tags:
        - Fixtures
      summary: Import des compos
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                      processed:
                        type: integer
                      success_count:
                        type: integer
                      failed:
                        type: integer
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - league_id
                - season_year
              properties:
                league_id:
                  type: number
                season_year:
                  type: number
                limit:
                  type: number
  /player/{id}:
    get:
      operationId: getPlayerById
      tags:
        - Players & Clubs
      summary: Profil d'un joueur
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      player:
                        type: object
                      career:
                        type: array
                        items:
                          type: object
                      careerTotals:
                        type: object
                      currentContext:
                        type: object
                      trophies:
                        type: array
                        items:
                          type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /player/{id}/sync-career:
    post:
      operationId: postPlayerByIdSyncCareer
      tags:
        - Players & Clubs
      summary: Synchroniser la carrière d'un joueur
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /search:
    get:
      operationId: getSearch
      tags:
        - Players & Clubs
      summary: Recherche globale
      responses:
        200:
          description: Succès - Résultats groupés par type (joueurs et clubs)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      players:
                        type: array
                        items:
                          type: object
                          properties:
                            player_id: { type: number }
                            api_id: { type: number }
                            name: { type: string }
                            firstname: { type: string }
                            lastname: { type: string }
                            nationality: { type: string }
                            nationality_flag:
                              {
                                type: string,
                                format: uri,
                                description: "URL du drapeau de la nationalité",
                              }
                            photo_url: { type: string, format: uri }
                            age: { type: number }
                      clubs:
                        type: array
                        items:
                          type: object
                          properties:
                            team_id: { type: number }
                            api_id: { type: number }
                            name: { type: string }
                            logo_url: { type: string, format: uri }
                            country: { type: string }
                            country_flag:
                              {
                                type: string,
                                format: uri,
                                description: "URL du drapeau du pays",
                              }
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [all, player, club]
        - name: country
          in: query
          required: false
          schema:
            type: string
  /search/countries:
    get:
      operationId: getSearchCountries
      tags:
        - Players & Clubs
      summary: Lister les pays disponibles pour le filtrage de recherche (avec métadonnées V3)
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        flag_url: { type: string, format: uri }
                        importance_rank: { type: number }
        500:
          description: Erreur serveur
  /club/{id}:
    get:
      operationId: getClubById
      tags:
        - Players & Clubs
      summary: Profil d'un club
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      club:
                        type: object
                      seasons:
                        type: array
                        items:
                          type: object
                      availableYears:
                        type: array
                        items:
                          type: integer
                      rosterYear:
                        type: integer
                        nullable: true
                      roster:
                        type: array
                        items:
                          type: object
                      summary:
                        type: object
                        nullable: true
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /club/{id}/tactical-summary:
    get:
      operationId: getClubByIdTacticalSummary
      tags:
        - Players & Clubs
      summary: Résumé tactique d'un club
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /club/{id}/matches:
    get:
      operationId: getClubByIdMatches
      tags:
        - Players & Clubs
      summary: Matchs d'un club
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /import/trophies:
    post:
      operationId: postImportTrophies
      tags:
        - Players & Clubs
      summary: Importer trophées de joueurs
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playerIds
              properties:
                playerIds:
                  type: array
                  items:
                    type: number
  /players/nationalities:
    get:
      operationId: getPlayersNationalities
      tags:
        - Players & Clubs
      summary: Lister les nationalités des joueurs
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
        400:
          description: Erreur de validation
        500:
          description: Erreur serveur
  /players/by-nationality:
    get:
      operationId: getPlayersByNationality
      tags:
        - Players & Clubs
      summary: Joueurs par nationalité
      responses:
        200:
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
        400:
          description: Erreur de validation
