services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: statfoot-backend
    user: root
    command: npm run dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_PATH=/app/data/database.sqlite
      - NODE_ENV=development
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: statfoot-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001/api
      - VITE_BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: statfoot-ml-service
    ports:
      - "8008:8008"
    volumes:
      - ./backend/data:/app/data
      - statfoot-ml-models-vol:/app/models
      - ./ml-service:/app
    environment:
      - DATABASE_PATH=/app/data/database.sqlite
      - MODELS_PATH=/app/models
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  statfoot-db-vol:
  statfoot-ml-models-vol:
